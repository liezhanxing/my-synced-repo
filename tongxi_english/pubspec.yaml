name: tongxi_english
description: 童希英语 - An anime-style English learning app for Chinese high school students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Navigation
  flutter_riverpod: ^2.4.9
  go_router: ^17.2.1
  
  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_remote_config: ^6.4.0
  
  # Audio & Speech
  audioplayers: ^6.6.0
  flutter_tts: ^4.2.5
  record: ^6.2.0
  
  # UI & Animation
  lottie: ^3.0.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Charts & Progress
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  
  # Images & Network
  cached_network_image: ^3.3.1
  
  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.3.3
  path_provider: ^2.1.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
    - assets/fonts/
  
